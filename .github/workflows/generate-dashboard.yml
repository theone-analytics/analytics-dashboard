name: Generate Dashboard Page

on:
  issues:
    types: [opened]

permissions:
  contents: write
  issues: write
  models: read

jobs:
  generate:
    runs-on: ubuntu-latest
    if: ${{ !contains(github.event.issue.labels.*.name, 'bug') }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install openai

      - name: Run generator
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PROMPT: ${{ github.event.issue.title }}
          REQUESTER: ${{ github.event.issue.user.login }}
        run: |
          python scripts/generate_dashboard.py \
            --action generate \
            --prompt "$PROMPT" \
            --requester "$REQUESTER"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pages/custom/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            PROMPT="${{ github.event.issue.title }}"
            git commit -m "dashboard: ${PROMPT:0:50}"
            git push
          fi

      - name: Close issue
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PROMPT="${{ github.event.issue.title }}"
          if echo "$PROMPT" | grep -qiE "삭제|제거|delete|remove|지워"; then
            COMMENT="✅ 대시보드가 삭제되었습니다."
          else
            COMMENT="✅ 대시보드가 생성되었습니다. 잠시 후 배포됩니다."
          fi
          gh issue close ${{ github.event.issue.number }} --comment "$COMMENT"

      - name: Comment on failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PROMPT="${{ github.event.issue.title }}"
          if echo "$PROMPT" | grep -qiE "삭제|제거|delete|remove|지워"; then
            COMMENT="❌ 대시보드 삭제에 실패했습니다. 다시 시도해주세요."
          else
            COMMENT="❌ 대시보드 생성에 실패했습니다. 다시 시도해주세요."
          fi
          gh issue comment ${{ github.event.issue.number }} --body "$COMMENT"

      - name: Notify Slack
        if: always()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -z "$SLACK_WEBHOOK_URL" ]; then
            echo "No Slack webhook configured, skipping notification"
            exit 0
          fi
          STATUS="${{ job.status }}"
          PROMPT="${{ github.event.issue.title }}"
          REQUESTER=$(gh api users/${{ github.event.issue.user.login }} --jq '.name // "${{ github.event.issue.user.login }}"')
          IS_DELETE=$(echo "$PROMPT" | grep -ciE "삭제|제거|delete|remove|지워")
          if [ "$STATUS" = "success" ]; then
            EMOJI="✅"
            if [ "$IS_DELETE" -gt 0 ]; then
              MSG="대시보드가 삭제되었습니다"
            else
              MSG="대시보드가 생성되었습니다"
            fi
          else
            EMOJI="❌"
            if [ "$IS_DELETE" -gt 0 ]; then
              MSG="대시보드 삭제에 실패했습니다"
            else
              MSG="대시보드 생성에 실패했습니다"
            fi
          fi
          PAYLOAD=$(jq -n --arg text "${EMOJI} ${MSG}
요청: ${PROMPT}
요청자: ${REQUESTER}" '{text: $text}')
          curl -sf -X POST "$SLACK_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" || echo "Slack 알림 전송 실패"
