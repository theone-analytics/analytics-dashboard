name: Dashboard Generator

on:
  issues:
    types: [opened]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      models: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install openai
      - name: Generate
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PROMPT="${{ github.event.issue.title }}"
          REQUESTER="${{ github.event.issue.user.login }}"
          python scripts/generate_dashboard.py --action generate --prompt "$PROMPT" --requester "$REQUESTER"
      - name: Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pages/custom/
          git diff --cached --quiet || git commit -m "dashboard" && git push
      - name: Close
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh issue close ${{ github.event.issue.number }} --comment "done"
      - name: Fail
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh issue comment ${{ github.event.issue.number }} --body "failed"
      - name: Slack
        if: always()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          test -z "$SLACK_WEBHOOK_URL" && exit 0
          PROMPT="${{ github.event.issue.title }}"
          REQUESTER="${{ github.event.issue.user.login }}"
          NAME=$(gh api "users/$REQUESTER" --jq ".name // .login" 2>/dev/null || echo "$REQUESTER")
          STATUS="${{ job.status }}"
          IS_DEL=$(echo "$PROMPT" | grep -ciE "삭제|제거|delete|remove" || true)
          if [ "$STATUS" = "success" ]; then
            [ "$IS_DEL" -gt 0 ] && MSG="삭제 완료" || MSG="생성 완료"
          else
            [ "$IS_DEL" -gt 0 ] && MSG="삭제 실패" || MSG="생성 실패"
          fi
          PAYLOAD=$(jq -n --arg t "$MSG - $PROMPT" '{text:$t}')
          curl -sf -X POST "$SLACK_WEBHOOK_URL" -H "Content-Type: application/json" -d "$PAYLOAD" || true
